name: true-up
on: [push, pull_request]

# This is a MIRROR of the local trust anchor, not the source of truth. The repo is validated by
# `npm run ci` (scripts/ci.sh) run locally; CI just re-runs that exact same command. The publish gate
# is the LOCAL `npm run ci` being green — not this workflow.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # devDependencies (web-tree-sitter + tree-sitter-wasms) are needed for the Tier-2 symbol tests
      - run: npm install
      # the single trust anchor: fixtures + self-gate + contract --check + pack + clean-sandbox
      # install + lean check + run-from-tarball + real gate + tarball hygiene + version coherence
      - run: npm run ci
